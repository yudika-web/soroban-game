<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soroban Kids - Belajar Sempoa</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/core-js/3.33.0/minified.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Penguncian layar absolut untuk iOS / No Scroll */
        html, body {
            height: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #e0f2fe;
            background-image: radial-gradient(#bae6fd 2px, transparent 2px), radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
            user-select: none;
            -webkit-user-select: none; 
            touch-action: none; /* Mencegah pull-to-refresh & scroll */
            display: flex;
            justify-content: center;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .btn-push {
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-push:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 0 rgba(0,0,0,0) !important;
        }

        .bead-transition { transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .bead-candy { box-shadow: inset 0 3px 3px rgba(255,255,255,0.4), inset 0 -3px 4px rgba(0,0,0,0.2), 0 2px 3px rgba(0,0,0,0.2); }
        .abacus-frame { box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.2), inset 0 -4px 10px rgba(0, 0, 0, 0.4), 0 5px 15px rgba(0,0,0,0.15); }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <div id="root" class="w-full h-full max-w-[400px] bg-white/40 shadow-2xl overflow-y-auto relative flex flex-col mx-auto border-x-4 border-white/50 pb-safe"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- AUDIO SYSTEM (iOS STRICT COMPATIBLE) ---
        const audioEngine = {
            ready: false,
            bgmEnabled: true,
            init: async function() {
                if (this.ready) return;
                try {
                    await Tone.start();
                    this.synths = {
                        click: new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination(),
                        // Bunyi Tik tik mekanik
                        bead: new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.005, decay: 0.05, sustain: 0, release: 0.05 } }).toDestination(),
                        correct: new Tone.PolySynth(Tone.Synth, { envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.5 } }).toDestination(),
                        wrong: new Tone.Synth({ oscillator: { type: 'sawtooth' }, envelope: { attack: 0.05, decay: 0.2, sustain: 0, release: 0.2 } }).toDestination()
                    };
                    
                    // Lagu 8-bit ceria
                    const melody = [["C5", "8n"], ["E5", "8n"], ["G5", "4n"], ["E5", "8n"], ["C5", "4n"], ["A4", "8n"], ["G4", "2n"]];
                    let noteIndex = 0;
                    this.bgm = new Tone.Loop(time => {
                        let note = melody[noteIndex % melody.length];
                        this.synths.correct.triggerAttackRelease(note[0], note[1], time, 0.1);
                        noteIndex++;
                    }, "4n");
                    Tone.Transport.bpm.value = 140;

                    this.ready = true;
                    if(this.bgmEnabled) Tone.Transport.start();
                } catch(e) { console.warn("Audio diblokir browser/OS", e); }
            },
            playClick: function() { if(this.ready) try{ this.synths.click.triggerAttackRelease("C6", "16n", Tone.now(), 0.3); }catch(e){} },
            playBead: function() { if(this.ready) try{ this.synths.bead.triggerAttackRelease("G4", "32n", Tone.now(), 0.1); }catch(e){} },
            playCorrect: function() { if(this.ready) try{ this.synths.correct.triggerAttackRelease(["C5", "E5", "G5"], "4n", Tone.now(), 0.5); }catch(e){} },
            playWrong: function() { if(this.ready) try{ this.synths.wrong.triggerAttackRelease("C3", "8n", Tone.now(), 0.3); }catch(e){} },
            toggleBGM: function() {
                if(!this.ready) return;
                try {
                    if (this.bgmEnabled) {
                        Tone.Transport.start();
                        this.bgm.start(0);
                    } else {
                        this.bgm.stop();
                        Tone.Transport.stop();
                    }
                } catch(e) {}
            }
        };

        // --- ICONS ---
        const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v5h5"></path><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path><path d="M12 7v5l4 2"></path></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconBack = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>;
        const IconLightbulb = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18h6"></path><path d="M10 22h4"></path><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 1 0 6 8c0 1.45.62 2.84 1.5 3.5.76.75 1.23 1.51 1.41 2.5"></path></svg>;
        const IconSpeakerOn = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>;
        const IconSpeakerOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>;

        const BEAD_THEMES = [
            { id: 'emerald', label: 'Hijau', classes: 'bg-emerald-400' },
            { id: 'sky', label: 'Biru', classes: 'bg-sky-400' },
            { id: 'rose', label: 'Pink', classes: 'bg-rose-400' },
            { id: 'amber', label: 'Kuning', classes: 'bg-amber-400' },
            { id: 'violet', label: 'Ungu', classes: 'bg-violet-400' },
            { id: 'brown', label: 'Coklat', classes: 'bg-[#d29b68]' }
        ];

        const BOARD_THEMES = [
            { id: 'slate', label: 'Batu', classes: 'bg-slate-700', div: 'bg-slate-900', rod: 'bg-slate-400' },
            { id: 'wood', label: 'Kayu', classes: 'bg-[#8d6e63]', div: 'bg-[#4e342e]', rod: 'bg-slate-200' },
            { id: 'light', label: 'Putih', classes: 'bg-slate-200', div: 'bg-slate-400', rod: 'bg-slate-500' },
            { id: 'navy', label: 'Navy', classes: 'bg-indigo-900', div: 'bg-black', rod: 'bg-indigo-200' }
        ];

        // --- ABACUS COMPONENTS (Fit iPhone X) ---
        const Bead = ({ type, isActive, index, onClick, beadTheme }) => {
            let transformY = 0;
            if (type === 'top') {
                transformY = isActive ? 26 : 4; 
            } else {
                if (isActive) {
                    transformY = 4 + (index - 1) * 20; 
                } else {
                    transformY = 100 - 4 - (4 - index) * 20 - 20; 
                }
            }

            return (
                <div 
                    onPointerDown={(e) => { e.preventDefault(); onClick(); }}
                    className={`absolute w-[40px] h-[20px] rounded-full cursor-pointer bead-transition z-10 bead-candy hover:brightness-110 active:brightness-95 ${beadTheme.classes}`}
                    style={{ transform: `translateY(${transformY}px)`, left: '50%', marginLeft: '-20px', backgroundColor: beadTheme.classes.replace('bg-', '') }}
                />
            );
        };

        const AbacusColumn = ({ value, onChange, themeConfig, isHighlighted, isReadonly }) => {
            const topActive = value >= 5;
            const bottomActiveCount = value % 5;

            const handleTopClick = () => {
                if(isReadonly) return;
                audioEngine.playBead();
                onChange(topActive ? value - 5 : value + 5);
            };

            const handleBottomClick = (beadIndex) => {
                if(isReadonly) return;
                audioEngine.playBead();
                onChange((topActive ? 5 : 0) + (beadIndex <= bottomActiveCount ? beadIndex - 1 : beadIndex));
            };

            return (
                <div className={`flex flex-col items-center w-[46px] h-full relative transition-all duration-300 rounded-full ${isHighlighted ? 'bg-amber-300/40 ring-2 ring-amber-400/50' : ''}`}>
                    <div className={`absolute top-0 bottom-0 w-2 rounded-full z-0 left-1/2 -ml-[4px] shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)] ${themeConfig.board.rod}`}></div>
                    <div className="relative w-full h-[50px]">
                        <Bead type="top" isActive={topActive} onClick={handleTopClick} beadTheme={themeConfig.bead} />
                    </div>
                    <div className="w-full h-[10px]"></div>
                    <div className="relative w-full h-[100px]">
                        {[1, 2, 3, 4].map(idx => (
                            <Bead key={`bottom-${idx}`} type="bottom" index={idx} isActive={idx <= bottomActiveCount} onClick={() => handleBottomClick(idx)} beadTheme={themeConfig.bead} />
                        ))}
                    </div>
                </div>
            );
        };

        const Abacus = ({ values, setValues, theme, highlightCols = [], isReadonly = false }) => {
            const bTheme = BOARD_THEMES.find(t => t.id === theme.board) || BOARD_THEMES[0];
            const beadTheme = BEAD_THEMES.find(t => t.id === theme.bead) || BEAD_THEMES[0];
            const themeConfig = { board: bTheme, bead: beadTheme };

            const handleColChange = (colIndex, newValue) => {
                if(isReadonly) return;
                const newValues = [...values];
                newValues[colIndex] = newValue;
                if(setValues) setValues(newValues);
            };

            return (
                <div className={`w-full p-2 rounded-2xl abacus-frame relative ${bTheme.classes} ${isReadonly ? 'opacity-95' : ''}`}>
                    <div className={`absolute top-[56px] left-0 right-0 h-[8px] z-20 shadow-[0_4px_6px_rgba(0,0,0,0.3)] border-y border-white/20 ${bTheme.div}`}></div>
                    <div className="flex justify-between items-center w-full px-1">
                        {values.map((val, idx) => (
                            <AbacusColumn key={idx} value={val} onChange={(newVal) => handleColChange(idx, newVal)} themeConfig={themeConfig} isHighlighted={highlightCols.includes(idx)} isReadonly={isReadonly} />
                        ))}
                    </div>
                </div>
            );
        };

        // Custom Button dgn Trigger Audio
        const PBtn = ({ onClick, children, className, title, disabled }) => (
            <button 
                title={title}
                disabled={disabled}
                className={`btn-push ${className}`}
                onClick={async (e) => { 
                    if(!audioEngine.ready) await audioEngine.init(); 
                    audioEngine.playClick(); 
                    if(onClick) onClick(e); 
                }}
            >
                {children}
            </button>
        );

        // --- MENUS ---
        const MainMenu = ({ onStart, onOpenHistory, onOpenTutorial, theme, updateTheme, isMuted, toggleMute }) => {
            const [operation, setOperation] = useState('+');
            const [placeValue, setPlaceValue] = useState('satuan');
            const [rowCount, setRowCount] = useState(2);

            return (
                <div className="flex flex-col h-full bg-gradient-to-b from-transparent to-white/60">
                    <div className="absolute top-3 right-3 z-20">
                        <PBtn onClick={toggleMute} className="p-2 bg-white/80 backdrop-blur rounded-full shadow-sm text-slate-600">
                            {isMuted ? <IconSpeakerOff /> : <IconSpeakerOn />}
                        </PBtn>
                    </div>

                    <div className="text-center mt-6 mb-2 px-4">
                        <div className="inline-block p-2 px-6 bg-white rounded-3xl shadow-md border-2 border-sky-100 transform -rotate-2 relative">
                            <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-emerald-400 tracking-wide">SOROBAN</h1>
                            <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 w-max">
                                <p className="text-sky-600 font-bold text-[11px] bg-sky-50 px-2 py-0.5 rounded-full shadow-sm border border-sky-100">AYO BELAJAR SEMPOA! ✨</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 space-y-3 overflow-y-auto px-4 pb-2 mt-4">
                        <div className="glass-card p-3 rounded-2xl">
                            <label className="flex items-center gap-1 text-slate-700 font-black mb-2 text-sm"><span className="bg-sky-100 text-sky-600 p-0.5 rounded-md">⚙️</span> Operasi</label>
                            <div className="grid grid-cols-2 gap-2">
                                {[{ id: '+', label: '+ Tambah' }, { id: '-', label: '- Kurang' }, { id: '*', label: '× Kali' }, { id: '/', label: '÷ Bagi' }, { id: 'mix+-', label: '+ & - Campur' }, { id: 'mixAll', label: '✨ Semua' }].map(op => (
                                    <PBtn key={op.id} onClick={() => setOperation(op.id)} className={`py-2 rounded-xl font-black transition-all text-sm ${operation === op.id ? 'bg-sky-500 text-white shadow-[0_3px_0_#0284c7]' : 'bg-slate-50 text-slate-600 border border-slate-100 shadow-[0_2px_0_#e2e8f0]'}`}>{op.label}</PBtn>
                                ))}
                            </div>
                        </div>

                        <div className="glass-card p-3 rounded-2xl">
                            <label className="flex items-center gap-1 text-slate-700 font-black mb-2 text-sm"><span className="bg-amber-100 text-amber-600 p-0.5 rounded-md">🔢</span> Maksimal</label>
                            <div className="grid grid-cols-3 gap-2">
                                {[{ id: 'satuan', label: 'Satuan' }, { id: 'puluhan', label: 'Puluhan' }, { id: 'ratusan', label: 'Ratusan' }].map(pv => (
                                    <PBtn key={pv.id} onClick={() => setPlaceValue(pv.id)} className={`py-2 rounded-xl font-black transition-all text-sm ${placeValue === pv.id ? 'bg-amber-400 text-amber-900 shadow-[0_3px_0_#d97706]' : 'bg-slate-50 text-slate-600 border border-slate-100 shadow-[0_2px_0_#e2e8f0]'}`}>{pv.label}</PBtn>
                                ))}
                            </div>
                        </div>

                        {['+', '-', 'mix+-'].includes(operation) && (
                            <div className="glass-card p-3 rounded-2xl animate-pop">
                                <label className="flex items-center gap-1 text-slate-700 font-black mb-2 text-sm"><span className="bg-rose-100 text-rose-600 p-0.5 rounded-md">📊</span> Baris Soal</label>
                                <div className="flex justify-between gap-2">
                                    {[2, 3, 4, 5].map(num => (
                                        <PBtn key={num} onClick={() => setRowCount(num)} className={`flex-1 py-2 rounded-xl font-black text-lg transition-all ${rowCount === num ? 'bg-rose-400 text-white shadow-[0_3px_0_#e11d48]' : 'bg-slate-50 text-slate-600 border border-slate-100 shadow-[0_2px_0_#e2e8f0]'}`}>{num}</PBtn>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="glass-card p-3 rounded-2xl">
                            <label className="flex items-center gap-1 text-slate-700 font-black mb-2 text-sm"><span className="bg-violet-100 text-violet-600 p-0.5 rounded-md">🎨</span> Tema</label>
                            <div className="mb-1 flex gap-3 overflow-x-auto py-1 px-1">
                                {BEAD_THEMES.map(bt => <PBtn key={bt.id} onClick={() => updateTheme('bead', bt.id)} className={`flex-shrink-0 w-6 h-6 rounded-full transition-all ${bt.classes} ${theme.bead === bt.id ? 'ring-2 ring-offset-2 ring-violet-400 scale-125 shadow-none' : 'shadow-[0_2px_0_rgba(0,0,0,0.2)] opacity-80'}`} title={bt.label} /> )}
                            </div>
                            <div className="flex gap-3 overflow-x-auto py-1 px-1">
                                {BOARD_THEMES.map(bt => <PBtn key={bt.id} onClick={() => updateTheme('board', bt.id)} className={`flex-shrink-0 w-6 h-6 rounded-md transition-all ${bt.classes} ${theme.board === bt.id ? 'ring-2 ring-offset-2 ring-violet-400 scale-125 shadow-none' : 'shadow-[0_2px_0_rgba(0,0,0,0.3)] opacity-80'}`} title={bt.label} /> )}
                            </div>
                        </div>
                    </div>

                    <div className="p-3 bg-white/80 backdrop-blur-md border-t border-white rounded-t-2xl flex gap-2 shadow-[0_-5px_15px_rgba(0,0,0,0.03)] z-10 mt-auto">
                        <PBtn onClick={onOpenHistory} className="bg-slate-100 text-slate-600 p-3 rounded-xl font-bold shadow-[0_3px_0_#cbd5e1] flex items-center justify-center"><IconHistory /></PBtn>
                        <PBtn onClick={onOpenTutorial} className="bg-amber-300 text-amber-900 p-3 rounded-xl font-bold shadow-[0_3px_0_#b45309] flex items-center justify-center"><IconBook /></PBtn>
                        <PBtn onClick={() => onStart({ operation, placeValue, rowCount })} className="flex-1 bg-emerald-400 text-white py-3 rounded-xl font-black text-lg shadow-[0_4px_0_#059669] flex justify-center items-center gap-1"><IconPlay /> MULAI</PBtn>
                    </div>
                </div>
            );
        };

        const generateMathProblem = (settings) => {
            const { operation, placeValue, rowCount } = settings;
            const maxVal = placeValue === 'satuan' ? 9 : placeValue === 'puluhan' ? 99 : 999;
            const MAX_ABACUS_VAL = 999999; 
            const rows = (['*', '/', 'mixAll'].includes(operation)) ? 2 : rowCount;
            const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

            let opType = operation;
            if (operation === 'mixAll') opType = ['+', '-', '*', '/'][rand(0, 3)];

            if (opType === '*') {
                let a = rand(2, maxVal);
                let maxB = Math.min(Math.floor(MAX_ABACUS_VAL / a), placeValue === 'ratusan' ? 99 : 9);
                let b = rand(2, Math.max(2, maxB)); 
                return { rows: [a.toString(), `× ${b}`], expected: a * b };
            } else if (opType === '/') {
                let b = rand(2, placeValue === 'ratusan' ? 99 : 9); 
                let ans = rand(2, maxVal);
                let a = b * ans;
                while (a > MAX_ABACUS_VAL) { ans = rand(2, maxVal); a = b * ans; }
                return { rows: [a.toString(), `÷ ${b}`], expected: ans };
            } else {
                let currentTotal = rand(1, maxVal);
                let problemRows = [currentTotal.toString()];
                for (let i = 1; i < rows; i++) {
                    let currentOp = opType === 'mix+-' ? (Math.random() > 0.5 ? '+' : '-') : opType;
                    if (currentOp === '+') {
                        let maxV = Math.min(maxVal, MAX_ABACUS_VAL - currentTotal);
                        if (maxV < 1) { currentOp = '-'; } 
                        else { let v = rand(1, maxV); currentTotal += v; problemRows.push(`+ ${v}`); }
                    }
                    if (currentOp === '-') {
                        let maxSub = Math.min(currentTotal, maxVal);
                        if (maxSub === 0) { let addV = rand(1, maxVal); currentTotal += addV; problemRows.push(`+ ${addV}`); } 
                        else { let v = rand(1, maxSub); currentTotal -= v; problemRows.push(`- ${v}`); }
                    }
                }
                return { rows: problemRows, expected: currentTotal };
            }
        };

        const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        const GameScreen = ({ settings, onBack, saveHistory, theme }) => {
            const [question, setQuestion] = useState(null);
            const [abacusValues, setAbacusValues] = useState([0,0,0,0,0,0]); 
            const [time, setTime] = useState(0);
            const [feedback, setFeedback] = useState(null); 
            const [isPlaying, setIsPlaying] = useState(true);
            const timerRef = useRef(null);

            const loadNewQuestion = useCallback(() => {
                setQuestion(generateMathProblem(settings));
                setAbacusValues([0,0,0,0,0,0]);
                setFeedback(null);
                setTime(0);
                setIsPlaying(true);
            }, [settings]);

            const handleRetry = () => {
                setAbacusValues([0,0,0,0,0,0]);
                setFeedback(null);
                setTime(0);
                setIsPlaying(true);
            };

            useEffect(() => { loadNewQuestion(); }, [loadNewQuestion]);

            useEffect(() => {
                if (isPlaying) timerRef.current = setInterval(() => setTime(t => t + 1), 1000);
                else clearInterval(timerRef.current);
                return () => clearInterval(timerRef.current);
            }, [isPlaying]);

            const getNumericValue = () => abacusValues[0]*100000 + abacusValues[1]*10000 + abacusValues[2]*1000 + abacusValues[3]*100 + abacusValues[4]*10 + abacusValues[5];

            const handleCheck = () => {
                if (!isPlaying) return;
                const userAns = getNumericValue();
                const isCorrect = userAns === question.expected;
                setIsPlaying(false);
                setFeedback(isCorrect ? 'correct' : 'wrong');
                if(isCorrect) audioEngine.playCorrect(); else audioEngine.playWrong();
                saveHistory({ questionStr: question.rows.join('  |  '), expected: question.expected, userAns: userAns, isCorrect: isCorrect, time: time, date: new Date().toISOString() });
            };

            if (!question) return null;

            return (
                <div className="flex flex-col h-full bg-gradient-to-b from-transparent to-white/50">
                    <div className="flex justify-between items-center p-2 bg-white/80 backdrop-blur-md shadow-sm border-b border-white z-10">
                        <PBtn onClick={onBack} className="p-1.5 text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-full shadow-[0_2px_0_#cbd5e1]"><IconBack /></PBtn>
                        <div className="flex items-center gap-1 font-black text-slate-700 bg-white border border-slate-100 px-2 py-0.5 rounded-lg shadow-sm text-xs"><span className="text-amber-500"><IconClock /></span> {formatTime(time)}</div>
                        <div className="w-8"></div> 
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center px-4 py-2">
                        <div className="bg-slate-800 p-2 rounded-xl shadow-lg border-[3px] border-slate-700 w-full max-w-[180px] relative">
                            <div className="absolute -top-1.5 left-4 w-1.5 h-3 bg-amber-400 rounded-full shadow-sm"></div>
                            <div className="absolute -top-1.5 right-4 w-1.5 h-3 bg-amber-400 rounded-full shadow-sm"></div>
                            <div className="flex flex-col items-end text-xl font-black text-white font-mono tracking-wider leading-[1.1]">
                                {question.rows.map((row, idx) => (
                                    <div key={idx} className={`${idx === question.rows.length - 1 ? 'border-b-2 border-slate-500 pb-1 mb-1 w-full text-right' : ''}`}>{row}</div>
                                ))}
                            </div>
                            <div className="mt-1 h-5 flex items-center justify-center bg-slate-900/50 rounded-lg">
                                {feedback === 'correct' && <div className="text-emerald-400 font-black text-[10px] animate-pop drop-shadow-[0_1px_1px_rgba(0,0,0,0.5)]">BENAR! 🎉</div>}
                                {feedback === 'wrong' && <div className="text-rose-400 font-black text-[10px] animate-pop drop-shadow-[0_1px_1px_rgba(0,0,0,0.5)]">COBA LAGI 😅</div>}
                            </div>
                        </div>
                    </div>

                    <div className="p-2 bg-white/90 backdrop-blur-md rounded-t-2xl shadow-[0_-5px_15px_rgba(0,0,0,0.05)] border-t border-white mt-auto">
                        <div className="text-center mb-1">
                            <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest bg-slate-100 px-1.5 py-0.5 rounded-md">Nilai Sempoa</span>
                            <div className="text-base font-black text-sky-500 leading-none mt-1">{getNumericValue()}</div>
                        </div>
                        <Abacus values={abacusValues} setValues={setAbacusValues} theme={theme} isReadonly={!isPlaying} />
                        <div className="flex gap-2 mt-2 mb-1">
                            {isPlaying ? (
                                <>
                                    <PBtn onClick={() => setAbacusValues([0,0,0,0,0,0])} className="bg-amber-100 text-amber-600 px-3 py-1.5 rounded-xl font-bold shadow-[0_2px_0_#fcd34d] flex justify-center items-center"><IconRefresh /></PBtn>
                                    <PBtn onClick={handleCheck} className="flex-1 bg-sky-400 text-white py-1.5 rounded-xl font-black text-sm shadow-[0_2px_0_#0ea5e9] flex justify-center items-center gap-1"><IconCheck /> CEK</PBtn>
                                </>
                            ) : (
                                <>
                                    <PBtn onClick={handleRetry} className="bg-amber-400 text-white px-3 py-1.5 rounded-xl font-black text-sm shadow-[0_2px_0_#d97706] flex justify-center items-center gap-1"><IconRefresh /> ULANGI</PBtn>
                                    <PBtn onClick={loadNewQuestion} className="flex-1 bg-emerald-400 text-white py-1.5 rounded-xl font-black text-sm shadow-[0_2px_0_#059669] flex justify-center items-center gap-1 animate-[pulse_2s_infinite]">LANJUT <IconArrowRight /></PBtn>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const numToAbacusArr = (num) => num.toString().padStart(6, '0').split('').map(Number);

        // --- TUTORIAL COMPONENTS ---
        const TUTORIAL_DATA = [
            { id: 'intro', title: 'Kenalan Sempoa', icon: '🎯', color: 'text-sky-500 bg-sky-100 border-sky-300', steps: [{ text: 'Tiang paling kanan adalah Satuan.', val: 0, hl: [5] }, { text: 'Ke kiri berurutan: Puluhan, Ratusan, Ribuan...', val: 0, hl: [0,1,2,3,4] }, { text: 'Biji yang merapat ke tengah bernilai aktif.', val: 123456, hl: [] }], practice: [{ q: 'Tunjukkan angka 5!', expected: 5, hint: 'Geser 1 biji atas (bernilai 5) di tiang kanan ke bawah.' }] },
            { id: 'sk', title: 'Sahabat Kecil', icon: '🖐️', color: 'text-teal-500 bg-teal-100 border-teal-300', steps: [{ text: 'Dipakai saat butuh bantuan angka 5. 1↔4, 2↔3.', val: 0, hl: [] }, { text: 'Tambah: +1 = +5-4 | Kurang: -1 = -5+4', val: 0, hl: [] }, { text: 'Contoh: 4 + 1. Atur sempoa ke 4.', val: 4, hl: [5] }, { text: 'Gunakan +5 -4 (Turunkan 5, Turunkan 4). Hasil 5.', val: 5, hl: [5] }], practice: [{ q: 'Hitung: 4 + 1', expected: 5, hint: 'Gunakan +5 -4' }, { q: 'Hitung: 5 - 2', expected: 3, hint: 'Gunakan -5 +3' }] },
            { id: 'sb', title: 'Sahabat Besar', icon: '🤝', color: 'text-blue-500 bg-blue-100 border-blue-300', steps: [{ text: 'Dipakai saat lewat angka 9. Buat angka 10. 1↔9, 5↔5.', val: 0, hl: [] }, { text: 'Contoh: 8 + 4. Atur sempoa ke 8.', val: 8, hl: [5] }, { text: 'Tak cukup. Sahabat besar 4 adalah 6 (+10 -6).', val: 8, hl: [5] }, { text: 'Naikkan 1 puluhan, buang 6 satuan. Hasil 12.', val: 12, hl: [4, 5] }], practice: [{ q: 'Hitung: 8 + 4', expected: 12, hint: 'Gunakan +10 -6' }] },
            { id: 'tambah', title: 'Penjumlahan', icon: '➕', color: 'text-emerald-500 bg-emerald-100 border-emerald-300', steps: [{ text: 'Contoh: 23 + 14', val: 0, hl: [] }, { text: 'Atur sempoa ke 23.', val: 23, hl: [4,5] }, { text: 'Tambah 1 puluhan. Lalu 4 satuan.', val: 37, hl: [4,5] }], practice: [{ q: '15 + 22', expected: 37, hint: 'Atur 15, tambah 2 puluhan, 2 satuan.' }] },
            { id: 'kurang', title: 'Pengurangan', icon: '➖', color: 'text-rose-500 bg-rose-100 border-rose-300', steps: [{ text: 'Contoh: 56 - 23', val: 0, hl: [] }, { text: 'Atur sempoa ke 56.', val: 56, hl: [4,5] }, { text: 'Kurang 2 puluhan, kurang 3 satuan.', val: 33, hl: [4,5] }], practice: [{ q: '45 - 21', expected: 24, hint: 'Atur 45. Kurang 2 puluhan, 1 satuan.' }] }
        ];

        const TutorialMenu = ({ onSelect, onBack }) => (
            <div className="flex flex-col h-full bg-slate-50">
                <div className="flex items-center p-2 bg-white shadow-sm border-b border-slate-100 z-10 gap-2">
                    <PBtn onClick={onBack} className="p-1.5 text-slate-500 bg-slate-100 rounded-full shadow-[0_2px_0_#cbd5e1]"><IconBack /></PBtn>
                    <h2 className="font-black text-lg text-slate-700">Pilih Pelajaran</h2>
                </div>
                <div className="flex-1 overflow-y-auto p-3 space-y-2">
                    {TUTORIAL_DATA.map((tut, idx) => (
                        <PBtn key={tut.id} onClick={() => onSelect(tut)} className={`w-full text-left p-2 rounded-xl border-2 shadow-sm bg-white flex items-center gap-2 ${tut.color.replace('bg-', 'border-').replace('100', '200')}`}>
                            <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-xl shadow-sm ${tut.color}`}>{tut.icon}</div>
                            <div>
                                <h3 className="font-black text-slate-800 text-xs">{idx + 1}. {tut.title}</h3>
                                <p className="text-[10px] text-slate-500 font-bold">{tut.steps.length} Langkah</p>
                            </div>
                        </PBtn>
                    ))}
                </div>
            </div>
        );

        const TutorialReader = ({ topic, onFinish, onBack, theme }) => {
            const [stepIdx, setStepIdx] = useState(0);
            const step = topic.steps[stepIdx];

            return (
                <div className="flex flex-col h-full bg-slate-50">
                    <div className="flex justify-between items-center p-2 bg-white shadow-sm border-b border-slate-100">
                        <PBtn onClick={onBack} className="flex items-center gap-1 font-bold text-slate-500 text-[10px] bg-slate-100 px-2 py-1.5 rounded-lg shadow-[0_2px_0_#cbd5e1]"><IconBack /> Menu</PBtn>
                        <div className="font-black text-sky-500 text-[10px] bg-sky-100 px-2 py-0.5 rounded-md">{stepIdx + 1}/{topic.steps.length}</div>
                        <PBtn onClick={onFinish} className="font-bold text-amber-600 text-[10px] bg-amber-100 px-2 py-1.5 rounded-lg shadow-[0_2px_0_#fef08a]">Lewati</PBtn>
                    </div>
                    
                    <div className="flex-1 flex flex-col p-3 items-center justify-center overflow-y-auto">
                        <div className="glass-card p-3 rounded-xl w-full mb-3 text-center shadow-md">
                            <p className="text-[11px] font-extrabold text-slate-700">{step.text}</p>
                        </div>
                        <div className="w-full">
                            <Abacus values={numToAbacusArr(step.val)} theme={theme} highlightCols={step.hl} isReadonly={true} />
                        </div>
                    </div>

                    <div className="p-2 bg-white border-t border-slate-100 flex gap-2 mt-auto">
                        <PBtn onClick={() => setStepIdx(Math.max(0, stepIdx-1))} disabled={stepIdx === 0} className={`py-1.5 px-3 rounded-lg font-bold flex items-center justify-center ${stepIdx === 0 ? 'bg-slate-100 text-slate-300' : 'bg-slate-200 text-slate-700 shadow-[0_2px_0_#cbd5e1]'}`}>
                            <IconArrowLeft />
                        </PBtn>
                        <PBtn onClick={() => stepIdx < topic.steps.length - 1 ? setStepIdx(stepIdx + 1) : onFinish()} className="flex-1 bg-sky-400 text-white py-1.5 rounded-lg font-black text-xs shadow-[0_2px_0_#0ea5e9] flex justify-center items-center gap-1">
                            {stepIdx === topic.steps.length - 1 ? 'Latihan' : 'Lanjut'} {stepIdx < topic.steps.length - 1 && <IconArrowRight />}
                        </PBtn>
                    </div>
                </div>
            );
        };

        const TutorialPractice = ({ topic, onFinish, theme }) => {
            const [qIdx, setQIdx] = useState(0);
            const [abacusValues, setAbacusValues] = useState([0,0,0,0,0,0]);
            const [status, setStatus] = useState('idle'); 
            const [showHint, setShowHint] = useState(false);
            const currentQ = topic.practice[qIdx];

            const handleCheck = () => {
                const userAns = abacusValues[0]*100000 + abacusValues[1]*10000 + abacusValues[2]*1000 + abacusValues[3]*100 + abacusValues[4]*10 + abacusValues[5];
                const isC = userAns === currentQ.expected;
                setStatus(isC ? 'success' : 'error');
                if(isC){ setShowHint(false); audioEngine.playCorrect(); } else { audioEngine.playWrong(); }
            };

            return (
                <div className="flex flex-col h-full bg-slate-50">
                    <div className="flex justify-between items-center p-2 bg-white shadow-sm border-b border-slate-100">
                        <div className="font-black text-slate-700 text-xs">Latihan</div>
                        <div className="font-bold text-[10px] bg-amber-100 text-amber-600 px-2 py-0.5 rounded-md">Soal {qIdx + 1}/{topic.practice.length}</div>
                    </div>
                    
                    <div className="flex-1 p-2 flex flex-col">
                        <div className="bg-white p-3 rounded-xl shadow-sm border-2 border-slate-100 text-center mb-2">
                            <h3 className="text-sm font-black text-slate-800">{currentQ.q}</h3>
                            {status === 'error' && <div className="mt-1 p-1.5 bg-rose-100 text-rose-600 rounded-lg text-[10px] font-bold animate-pop">Belum tepat!</div>}
                            {status === 'success' && <div className="mt-1 p-1.5 bg-emerald-100 text-emerald-600 rounded-lg text-xs font-black animate-pop">🎉 Hebat!</div>}
                        </div>

                        {showHint && status !== 'success' && (
                            <div className="mb-2 p-2 bg-amber-50 border border-amber-200 rounded-lg flex items-start gap-1.5 animate-pop text-[10px]">
                                <span className="text-amber-500 bg-amber-100 p-0.5 rounded">💡</span>
                                <p className="font-bold text-amber-800">{currentQ.hint}</p>
                            </div>
                        )}

                        <div className="mt-auto">
                            <Abacus values={abacusValues} setValues={setAbacusValues} theme={theme} isReadonly={status === 'success'} />
                        </div>
                    </div>

                    <div className="p-2 bg-white border-t border-slate-100 flex gap-2">
                        {status === 'success' ? (
                            <PBtn onClick={() => qIdx < topic.practice.length - 1 ? (setQIdx(qIdx + 1), setAbacusValues([0,0,0,0,0,0]), setStatus('idle')) : onFinish()} className="flex-1 bg-emerald-400 text-white py-1.5 rounded-lg font-black text-xs shadow-[0_2px_0_#059669] flex justify-center items-center gap-1">
                                {qIdx === topic.practice.length - 1 ? 'Selesai' : 'Lanjut'} <IconArrowRight />
                            </PBtn>
                        ) : (
                            <>
                                <PBtn onClick={() => setShowHint(true)} className="bg-amber-100 text-amber-600 px-2.5 py-1.5 rounded-lg shadow-[0_2px_0_#fcd34d]"><IconLightbulb /></PBtn>
                                <PBtn onClick={() => setAbacusValues([0,0,0,0,0,0])} className="bg-slate-100 text-slate-500 px-2.5 py-1.5 rounded-lg shadow-[0_2px_0_#cbd5e1]"><IconRefresh /></PBtn>
                                <PBtn onClick={handleCheck} className="flex-1 bg-sky-400 text-white py-1.5 rounded-lg font-black text-xs shadow-[0_2px_0_#0ea5e9] flex justify-center items-center gap-1"><IconCheck /> CEK</PBtn>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('menu'); 
            const [settings, setSettings] = useState(null);
            const [theme, setTheme] = useState({ bead: 'emerald', board: 'slate' });
            const [activeTutorial, setActiveTutorial] = useState(null);
            const [isMuted, setIsMuted] = useState(!audioEngine.bgmEnabled);

            const handleToggleMute = async () => {
                if(!audioEngine.ready) await audioEngine.init();
                audioEngine.bgmEnabled = !audioEngine.bgmEnabled;
                setIsMuted(!audioEngine.bgmEnabled);
                audioEngine.toggleBGM();
            };

            return (
                <>
                    {view === 'menu' && <MainMenu onStart={(cfg) => { setSettings(cfg); setView('game'); }} onOpenHistory={() => {}} onOpenTutorial={() => setView('tutorial_menu')} theme={theme} updateTheme={(k,v) => setTheme({...theme, [k]:v})} isMuted={isMuted} toggleMute={handleToggleMute} />}
                    {view === 'game' && <GameScreen settings={settings} onBack={() => setView('menu')} saveHistory={() => {}} theme={theme} />}
                    {view === 'tutorial_menu' && <TutorialMenu onSelect={(topic) => { setActiveTutorial(topic); setView('tutorial_reader'); }} onBack={() => setView('menu')} />}
                    {view === 'tutorial_reader' && <TutorialReader topic={activeTutorial} onFinish={() => setView('tutorial_practice')} onBack={() => setView('tutorial_menu')} theme={theme} />}
                    {view === 'tutorial_practice' && <TutorialPractice topic={activeTutorial} onFinish={() => setView('tutorial_menu')} theme={theme} />}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
