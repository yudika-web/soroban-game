<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soroban Kids - Belajar Sempoa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tone.js for Synthesizer Sounds -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #e0f2fe;
            background-image: radial-gradient(#bae6fd 2px, transparent 2px), radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
            user-select: none;
            touch-action: manipulation;
            overflow: hidden; /* Prevent body scroll */
            display: flex;
            justify-content: center;
            height: 100dvh; /* Mobile fit-to-screen */
            width: 100vw;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }

        .btn-push {
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-push:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 0 rgba(0,0,0,0) !important;
        }

        .bead-transition {
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .bead-candy {
            box-shadow: inset 0 4px 4px rgba(255,255,255,0.4), inset 0 -4px 6px rgba(0,0,0,0.2), 0 2px 4px rgba(0,0,0,0.2);
        }

        .abacus-frame {
            box-shadow: 
                inset 0 4px 10px rgba(0, 0, 0, 0.2), 
                inset 0 -4px 10px rgba(0, 0, 0, 0.4),
                0 10px 20px rgba(0,0,0,0.15);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <div id="root" class="w-full h-full max-w-md bg-white shadow-2xl relative flex flex-col mx-auto border-x-4 border-white/50 overflow-hidden"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const SoundEngine = {
            initialized: false,
            isBgmMuted: false,
            async init() {
                if (this.initialized) return;
                await Tone.start();
                
                // Bunyi tik pendek untuk biji sempoa (menggantikan nada melodik)
                this.beadSynth = new Tone.MembraneSynth({ 
                    pitchDecay: 0.01, 
                    octaves: 1.5, 
                    oscillator: { type: 'square' }, 
                    envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.01 } 
                }).toDestination();
                this.beadSynth.volume.value = -8;

                this.btnSynth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
                this.btnSynth.volume.value = -15;

                this.fxSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                this.fxSynth.volume.value = -12;

                // BGM Synth yang ceria
                this.bgmSynth = new Tone.Synth({ 
                    oscillator: { type: 'fmtriangle', modulationIndex: 2, harmonicity: 1.5 }, 
                    envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.5 } 
                }).toDestination();
                this.bgmSynth.volume.value = -22; 

                // Melodi Ceria
                const happyMelody = ["C4", "E4", "G4", "C5", "A4", "G4", null, "E4", "F4", "A4", "G4", "E4", "D4", "E4", "C4", null];
                this.bgmSeq = new Tone.Sequence((time, note) => {
                    if(note) this.bgmSynth.triggerAttackRelease(note, "8n", time);
                }, happyMelody, "8n");
                
                Tone.Transport.bpm.value = 130;
                this.initialized = true;

                if (!this.isBgmMuted) {
                    this.bgmSeq.start(0);
                    Tone.Transport.start();
                }
            },
            playBead() { if (this.initialized) this.beadSynth.triggerAttackRelease("G5", "64n"); }, // Bunyi tik
            playBtn() { if (this.initialized) this.btnSynth.triggerAttackRelease("C6", "32n"); },
            playCorrect() { 
                if (!this.initialized) return;
                const now = Tone.now();
                this.fxSynth.triggerAttackRelease(["C5", "E5", "G5"], "8n", now);
                this.fxSynth.triggerAttackRelease(["C5", "E5", "C6"], "4n", now + 0.15);
            },
            playWrong() { 
                if (!this.initialized) return;
                const now = Tone.now();
                this.fxSynth.triggerAttackRelease(["D4", "F4"], "8n", now);
                this.fxSynth.triggerAttackRelease(["C#4", "E4"], "4n", now + 0.2);
            },
            setBgmMute(mute) {
                this.isBgmMuted = mute;
                if (this.initialized) {
                    if (mute) Tone.Transport.pause();
                    else { this.bgmSeq.start(0); Tone.Transport.start(); }
                }
            }
        };

        const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v5h5"></path><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path><path d="M12 7v5l4 2"></path></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconBack = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>;
        const IconLightbulb = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18h6"></path><path d="M10 22h4"></path><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 1 0 6 8c0 1.45.62 2.84 1.5 3.5.76.75 1.23 1.51 1.41 2.5"></path></svg>;
        const IconSkip = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>;
        const IconSoundOn = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
        const IconSoundOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="1" x2="1" y2="23"></line></svg>;
        const IconRepeat = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"></path><path d="M3.51 15A9 9 0 0 0 18.36 18.36L23 14"></path></svg>;

        const BEAD_THEMES = [
            { id: 'emerald', label: 'Hijau', classes: 'bg-emerald-400' },
            { id: 'sky', label: 'Biru', classes: 'bg-sky-400' },
            { id: 'rose', label: 'Pink', classes: 'bg-rose-400' },
            { id: 'amber', label: 'Kuning', classes: 'bg-amber-400' },
            { id: 'violet', label: 'Ungu', classes: 'bg-violet-400' },
            { id: 'brown', label: 'Coklat', classes: 'bg-[#d29b68]' }
        ];

        const BOARD_THEMES = [
            { id: 'slate', label: 'Batu', classes: 'bg-slate-700', div: 'bg-slate-900', rod: 'bg-slate-400' },
            { id: 'wood', label: 'Kayu', classes: 'bg-[#8d6e63]', div: 'bg-[#4e342e]', rod: 'bg-slate-200' },
            { id: 'light', label: 'Putih', classes: 'bg-slate-200', div: 'bg-slate-400', rod: 'bg-slate-500' },
            { id: 'navy', label: 'Navy', classes: 'bg-indigo-900', div: 'bg-black', rod: 'bg-indigo-200' }
        ];

        // Konstanta ukuran baru (diperbesar untuk jempol)
        const BEAD_H = 34; // Tinggi biji
        const BEAD_W = 56; // Lebar biji
        const TOP_CONT_H = 64; // Tinggi area atas
        const BTM_CONT_H = 168; // Tinggi area bawah (4 biji * 34 + ruang geser)

        const Bead = ({ type, isActive, index, onClick, beadTheme }) => {
            let transformY = 0;
            if (type === 'top') {
                // Area atas: Jika aktif turun (mendekati pembatas), jika tidak di atas
                transformY = isActive ? (TOP_CONT_H - BEAD_H - 4) : 4; 
            } else {
                // Area bawah
                if (isActive) {
                    // Aktif: naik ke atas mendekati pembatas
                    transformY = 4 + (index - 1) * BEAD_H; 
                } else {
                    // Tidak aktif: istirahat di bawah
                    transformY = BTM_CONT_H - 4 - (4 - index) * BEAD_H - BEAD_H; 
                }
            }

            return (
                <div 
                    onPointerDown={(e) => { e.preventDefault(); onClick(); SoundEngine.playBead(); }}
                    className={`absolute rounded-full cursor-pointer bead-transition z-10 bead-candy hover:brightness-110 active:brightness-95 ${beadTheme.classes}`}
                    style={{ 
                        width: `${BEAD_W}px`, 
                        height: `${BEAD_H}px`,
                        transform: `translateY(${transformY}px)`, 
                        left: '50%', 
                        marginLeft: `-${BEAD_W / 2}px`, 
                        backgroundColor: beadTheme.classes.replace('bg-', '') 
                    }}
                />
            );
        };

        const AbacusColumn = ({ value, onChange, themeConfig, isHighlighted, isReadonly }) => {
            const topActive = value >= 5;
            const bottomActiveCount = value % 5;

            const handleTopClick = () => { if(!isReadonly) onChange(topActive ? value - 5 : value + 5); };
            const handleBottomClick = (beadIndex) => { if(!isReadonly) onChange((topActive ? 5 : 0) + (beadIndex <= bottomActiveCount ? beadIndex - 1 : beadIndex)); };

            return (
                <div className={`flex flex-col items-center w-[60px] h-full relative transition-all duration-300 rounded-full ${isHighlighted ? 'bg-amber-300/40 ring-4 ring-amber-400/50' : ''}`}>
                    <div className={`absolute top-0 bottom-0 w-2.5 rounded-full z-0 left-1/2 -ml-[5px] shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)] ${themeConfig.board.rod}`}></div>
                    
                    <div className="relative w-full" style={{ height: `${TOP_CONT_H}px` }}>
                        <Bead type="top" isActive={topActive} onClick={handleTopClick} beadTheme={themeConfig.bead} />
                    </div>
                    
                    <div className="w-full h-[12px]"></div> {/* Ruang untuk divider absolute */}
                    
                    <div className="relative w-full" style={{ height: `${BTM_CONT_H}px` }}>
                        {[1, 2, 3, 4].map(idx => (
                            <Bead key={`bottom-${idx}`} type="bottom" index={idx} isActive={idx <= bottomActiveCount} onClick={() => handleBottomClick(idx)} beadTheme={themeConfig.bead} />
                        ))}
                    </div>
                </div>
            );
        };

        const Abacus = ({ values, setValues, theme, highlightCols = [], isReadonly = false }) => {
            const bTheme = BOARD_THEMES.find(t => t.id === theme.board) || BOARD_THEMES[0];
            const beadTheme = BEAD_THEMES.find(t => t.id === theme.bead) || BEAD_THEMES[0];
            const themeConfig = { board: bTheme, bead: beadTheme };

            const handleColChange = (colIndex, newValue) => {
                if(isReadonly) return;
                const newValues = [...values];
                newValues[colIndex] = newValue;
                if(setValues) setValues(newValues);
            };

            return (
                <div className={`w-full p-2 py-3 rounded-[2rem] abacus-frame relative ${bTheme.classes} ${isReadonly ? 'opacity-95' : ''}`}>
                    {/* Pembatas Tengah - Posisinya disesuaikan dengan padding atas dan ukuran container atas */}
                    <div className={`absolute left-0 right-0 h-[12px] z-20 shadow-[0_4px_6px_rgba(0,0,0,0.3)] border-y border-white/20 ${bTheme.div}`} style={{ top: `76px` }}></div>
                    
                    <div className="flex justify-between items-center w-full overflow-x-auto overflow-y-hidden" style={{ scrollbarWidth: 'none' }}>
                        {values.map((val, idx) => (
                            <AbacusColumn key={idx} value={val} onChange={(newVal) => handleColChange(idx, newVal)} themeConfig={themeConfig} isHighlighted={highlightCols.includes(idx)} isReadonly={isReadonly} />
                        ))}
                    </div>
                </div>
            );
        };

        const ConfirmDialog = ({ isOpen, title, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-[fadeIn_0.2s]">
                    <div className="bg-white p-6 rounded-[2rem] shadow-2xl w-full max-w-sm animate-pop text-center">
                        <div className="w-16 h-16 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4"><IconTrash /></div>
                        <h3 className="text-xl font-extrabold text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-500 font-semibold mb-6">{message}</p>
                        <div className="flex gap-3">
                            <button onClick={onCancel} className="flex-1 py-3 rounded-2xl font-bold bg-slate-100 text-slate-600 btn-push shadow-[0_4px_0_#cbd5e1] active:translate-y-1">Batal</button>
                            <button onClick={onConfirm} className="flex-1 py-3 rounded-2xl font-bold bg-rose-500 text-white btn-push shadow-[0_4px_0_#be123c] active:translate-y-1">Ya, Hapus</button>
                        </div>
                    </div>
                </div>
            );
        };

        const MainMenu = ({ onStart, onOpenHistory, onOpenTutorial, theme, updateTheme, isMuted, onToggleMute }) => {
            const [operation, setOperation] = useState('+');
            const [placeValue, setPlaceValue] = useState('satuan');
            const [rowCount, setRowCount] = useState(2);

            return (
                <div className="flex flex-col h-full bg-gradient-to-b from-transparent to-white/50 relative">
                    <button onClick={onToggleMute} className="absolute top-4 right-4 p-2.5 bg-white/80 rounded-full shadow-sm text-sky-500 z-50 btn-push border border-white">
                        {isMuted ? <IconSoundOff /> : <IconSoundOn />}
                    </button>

                    <div className="text-center mt-10 mb-4 px-4 animate-float flex flex-col items-center">
                        <div className="inline-block p-3 px-6 bg-white rounded-[1.5rem] shadow-lg border-4 border-sky-100 transform -rotate-2 text-center">
                            <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-emerald-400 tracking-wide leading-none">SOROBAN</h1>
                            <p className="text-sky-500 font-extrabold mt-1 text-[11px] uppercase tracking-widest">Ayo Belajar Sempoa! ✨</p>
                        </div>
                    </div>

                    <div className="flex-1 space-y-3 overflow-y-auto px-4 pb-4">
                        <div className="glass-card p-4 rounded-[1.5rem]">
                            <label className="flex items-center gap-2 text-slate-700 font-extrabold mb-2 text-base"><span className="bg-sky-100 text-sky-600 p-1 rounded-lg">⚙️</span> Tipe Operasi</label>
                            <div className="grid grid-cols-2 gap-2">
                                {[{ id: '+', label: 'Tambah (+)' }, { id: '-', label: 'Kurang (-)' }, { id: '*', label: 'Kali (×)' }, { id: '/', label: 'Bagi (÷)' }, { id: 'mix+-', label: 'Campur (+ -)' }, { id: 'mixAll', label: 'Semua (✨)' }].map(op => (
                                    <button key={op.id} onClick={() => setOperation(op.id)} className={`py-2 px-2 rounded-xl font-bold text-sm transition-all btn-push ${operation === op.id ? 'bg-sky-500 text-white shadow-[0_3px_0_#0284c7]' : 'bg-slate-50 text-slate-600 border border-slate-100 hover:bg-slate-100'}`}>{op.label}</button>
                                ))}
                            </div>
                        </div>

                        <div className="glass-card p-4 rounded-[1.5rem]">
                            <label className="flex items-center gap-2 text-slate-700 font-extrabold mb-2 text-base"><span className="bg-amber-100 text-amber-600 p-1 rounded-lg">🔢</span> Nilai Maksimal</label>
                            <div className="grid grid-cols-3 gap-2">
                                {[{ id: 'satuan', label: 'Satuan', val: '1-9' }, { id: 'puluhan', label: 'Puluhan', val: '10-99' }, { id: 'ratusan', label: 'Ratusan', val: 'Ratus' }].map(pv => (
                                    <button key={pv.id} onClick={() => setPlaceValue(pv.id)} className={`py-2 flex flex-col items-center justify-center rounded-xl transition-all btn-push ${placeValue === pv.id ? 'bg-amber-400 text-amber-900 shadow-[0_3px_0_#d97706]' : 'bg-slate-50 text-slate-600 border border-slate-100 hover:bg-slate-100'}`}>
                                        <span className="font-extrabold text-xs">{pv.label}</span>
                                        <span className="text-[10px] opacity-70 font-semibold">{pv.val}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {['+', '-', 'mix+-'].includes(operation) && (
                            <div className="glass-card p-4 rounded-[1.5rem] animate-pop">
                                <label className="flex items-center gap-2 text-slate-700 font-extrabold mb-2 text-base"><span className="bg-rose-100 text-rose-600 p-1 rounded-lg">📊</span> Jumlah Baris</label>
                                <div className="flex justify-between gap-2">
                                    {[2, 3, 4, 5].map(num => (
                                        <button key={num} onClick={() => setRowCount(num)} className={`flex-1 py-2 rounded-xl font-black text-lg transition-all btn-push ${rowCount === num ? 'bg-rose-400 text-white shadow-[0_3px_0_#e11d48]' : 'bg-slate-50 text-slate-600 border border-slate-100 hover:bg-slate-100'}`}>{num}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="glass-card p-4 rounded-[1.5rem]">
                            <label className="flex items-center gap-2 text-slate-700 font-extrabold mb-2 text-base"><span className="bg-violet-100 text-violet-600 p-1 rounded-lg">🎨</span> Tampilan</label>
                            <div className="mb-1">
                                <span className="text-xs font-bold text-slate-500 mb-1 block">Warna Biji:</span>
                                <div className="flex gap-3 overflow-x-auto py-2.5 px-3">
                                    {BEAD_THEMES.map(bt => <button key={bt.id} onClick={() => updateTheme('bead', bt.id)} className={`flex-shrink-0 w-6 h-6 rounded-full btn-push transition-all ${bt.classes} ${theme.bead === bt.id ? 'ring-2 ring-offset-2 ring-violet-400 scale-125 shadow-none' : 'shadow-[0_2px_0_rgba(0,0,0,0.2)] opacity-80'}`} title={bt.label} /> )}
                                </div>
                            </div>
                            <div>

        const generateMathProblem = (settings) => {
            const { operation, placeValue, rowCount } = settings;
            const maxVal = placeValue === 'satuan' ? 9 : placeValue === 'puluhan' ? 99 : 999;
            const MAX_ABACUS_VAL = 999999; 
            const rows = (['*', '/', 'mixAll'].includes(operation)) ? 2 : rowCount;
            const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

            let opType = operation;
            if (operation === 'mixAll') opType = ['+', '-', '*', '/'][rand(0, 3)];

            if (opType === '*') {
                let a = rand(2, maxVal);
                let maxB = Math.min(Math.floor(MAX_ABACUS_VAL / a), placeValue === 'ratusan' ? 99 : 9);
                let b = rand(2, Math.max(2, maxB)); 
                return { rows: [a.toString(), `× ${b}`], expected: a * b };
            } else if (opType === '/') {
                let b = rand(2, placeValue === 'ratusan' ? 99 : 9); 
                let ans = rand(2, maxVal);
                let a = b * ans;
                while (a > MAX_ABACUS_VAL) { ans = rand(2, maxVal); a = b * ans; }
                return { rows: [a.toString(), `÷ ${b}`], expected: ans };
            } else {
                let currentTotal = rand(1, maxVal);
                let problemRows = [currentTotal.toString()];
                for (let i = 1; i < rows; i++) {
                    let currentOp = opType === 'mix+-' ? (Math.random() > 0.5 ? '+' : '-') : opType;
                    if (currentOp === '+') {
                        let maxV = Math.min(maxVal, MAX_ABACUS_VAL - currentTotal);
                        if (maxV < 1) { currentOp = '-'; } 
                        else { let v = rand(1, maxV); currentTotal += v; problemRows.push(`+ ${v}`); }
                    }
                    if (currentOp === '-') {
                        let maxSub = Math.min(currentTotal, maxVal);
                        if (maxSub === 0) { let addV = rand(1, maxVal); currentTotal += addV; problemRows.push(`+ ${addV}`); } 
                        else { let v = rand(1, maxSub); currentTotal -= v; problemRows.push(`- ${v}`); }
                    }
                }
                return { rows: problemRows, expected: currentTotal };
            }
        };

            };

            return (
                <div className="flex flex-col h-full bg-slate-50">
                    <div className="flex justify-between items-center p-3 bg-white shadow-sm border-b-2 border-slate-100">
                        <div className="font-black text-slate-700 text-base">Latihan</div>
                        <div className="font-black bg-amber-100 text-amber-600 px-3 py-1 rounded-lg text-sm">Soal {qIdx + 1}/{topic.practice.length}</div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-2 flex flex-col">
                        <div className="bg-white p-3 rounded-2xl shadow-sm border-2 border-slate-100 text-center mb-2">
                            <h3 className="text-base font-black text-slate-800">{currentQ.q}</h3>
                            {status === 'error' && <div className="mt-1.5 p-1.5 bg-rose-100 text-rose-600 rounded-lg font-extrabold text-xs animate-pop">Belum tepat, coba lagi ya!</div>}
                            {status === 'success' && <div className="mt-1.5 p-1.5 bg-emerald-100 text-emerald-600 rounded-lg font-extrabold text-xs animate-pop">🎉 {currentQ.successMsg || 'Hebat! Benar, lanjutkan!'}</div>}
                        </div>

                        {showHint && status !== 'success' && (
                            <div className="mb-2 p-2 bg-amber-50 border-2 border-amber-200 rounded-xl flex items-start gap-2 animate-pop">
                                <div className="text-amber-500 bg-amber-100 p-1 rounded-lg"><IconLightbulb /></div>
                                <p className="font-bold text-amber-800 text-[11px] leading-relaxed">{currentQ.hint}</p>
                            </div>
                        )}

                        <div className="mt-auto">
                            <Abacus values={abacusValues} setValues={setAbacusValues} theme={theme} isReadonly={status === 'success'} />
                        </div>
                    </div>

                    <div className="p-3 bg-white rounded-t-[1.5rem] shadow-[0_-5px_15px_rgba(0,0,0,0.03)] border-t border-slate-100 flex gap-2">
                        {status === 'success' ? (
                            <button onClick={() => qIdx < topic.practice.length - 1 ? (setQIdx(qIdx + 1), setAbacusValues([0,0,0,0,0,0]), setStatus('idle')) : onFinish()} className="flex-1 bg-emerald-400 text-white py-2 rounded-xl font-black text-sm btn-push shadow-[0_3px_0_#059669] flex justify-center items-center gap-2">
                                {qIdx === topic.practice.length - 1 ? 'Selesai' : 'Lanjut'} <IconArrowRight />
                            </button>
                        ) : (
                            <>
                                <button onClick={() => setShowHint(true)} className="bg-amber-100 text-amber-600 px-3 py-2 rounded-xl font-bold btn-push shadow-[0_3px_0_#fcd34d] flex items-center justify-center" title="Petunjuk"><IconLightbulb /></button>
                                <button onClick={() => setAbacusValues([0,0,0,0,0,0])} className="bg-slate-100 text-slate-500 px-3 py-2 rounded-xl font-bold btn-push shadow-[0_3px_0_#cbd5e1] flex items-center justify-center" title="Ulangi Sempoa"><IconRefresh /></button>
                                <button onClick={handleCheck} className="flex-1 bg-sky-400 text-white py-2 rounded-xl font-black text-sm btn-push shadow-[0_3px_0_#0ea5e9] flex justify-center items-center gap-2"><IconCheck /> CEK</button>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('menu'); 
            const [settings, setSettings] = useState(null);
            const [history, setHistory] = useState([]);
            const [theme, setTheme] = useState({ bead: 'emerald', board: 'slate' });
            const [activeTutorial, setActiveTutorial] = useState(null);
            const [showConfirm, setShowConfirm] = useState(false);
            const [isMuted, setIsMuted] = useState(false);

            // Memuat riwayat dan pengaturan dari Local Storage saat aplikasi dimuat
            useEffect(() => {
                const saved = localStorage.getItem('soroban_history');
                if (saved) try { setHistory(JSON.parse(saved)); } catch(e) {}

                const savedTheme = localStorage.getItem('soroban_theme');
                if (savedTheme) try { setTheme(JSON.parse(savedTheme)); } catch(e) {}

                const savedMute = localStorage.getItem('soroban_mute');
                if (savedMute !== null) {
                    setIsMuted(savedMute === 'true');
                    SoundEngine.isBgmMuted = (savedMute === 'true');
                }
            }, []);

            useEffect(() => {
                const initAudioAndHandleClick = async (e) => {
                    if (!SoundEngine.initialized) {
                        await SoundEngine.init();
                        SoundEngine.setBgmMute(isMuted);
                    }
                    if (e.target.closest('button')) SoundEngine.playBtn();
                };
                document.addEventListener('pointerdown', initAudioAndHandleClick);
                return () => document.removeEventListener('pointerdown', initAudioAndHandleClick);
            }, [isMuted]);

            const handleToggleMute = () => {
                const newMuted = !isMuted;
                setIsMuted(newMuted);
                SoundEngine.setBgmMute(newMuted);
                localStorage.setItem('soroban_mute', newMuted);
            };

            const handleUpdateTheme = (key, val) => {
                const newTheme = { ...theme, [key]: val };
                setTheme(newTheme);
                localStorage.setItem('soroban_theme', JSON.stringify(newTheme));
            };

            const handleSaveHistory = (record) => {
                const newHistory = [...history, record];
                if(newHistory.length > 50) newHistory.shift(); // Simpan maksimal 50 riwayat terakhir
                setHistory(newHistory);
                localStorage.setItem('soroban_history', JSON.stringify(newHistory));
            };

            const handleClearHistory = () => {
                setHistory([]);
                localStorage.removeItem('soroban_history');
                setShowConfirm(false);
            };

            return (
                <>
                    {view === 'menu' && <MainMenu onStart={(cfg) => { setSettings(cfg); setView('game'); }} onOpenHistory={() => setView('history')} onOpenTutorial={() => setView('tutorial_menu')} theme={theme} updateTheme={handleUpdateTheme} isMuted={isMuted} onToggleMute={handleToggleMute} />}
                    {view === 'game' && <GameScreen settings={settings} onBack={() => setView('menu')} saveHistory={handleSaveHistory} theme={theme} />}
                    {view === 'history' && <HistoryScreen history={history} onBack={() => setView('menu')} onClear={() => setShowConfirm(true)} />}
                    {view === 'tutorial_menu' && <TutorialMenu onSelect={(topic) => { setActiveTutorial(topic); setView('tutorial_reader'); }} onBack={() => setView('menu')} />}
                    {view === 'tutorial_reader' && <TutorialReader topic={activeTutorial} onFinish={() => setView('tutorial_practice')} onBack={() => setView('tutorial_menu')} theme={theme} />}
                    {view === 'tutorial_practice' && <TutorialPractice topic={activeTutorial} onFinish={() => setView('tutorial_menu')} theme={theme} />}
                    
                    <ConfirmDialog isOpen={showConfirm} title="Hapus Riwayat?" message="Semua catatan latihanmu akan hilang. Lanjutkan?" onConfirm={handleClearHistory} onCancel={() => setShowConfirm(false)} />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
